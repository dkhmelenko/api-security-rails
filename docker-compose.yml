services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: secure_api
      POSTGRES_PASSWORD: secure_api
      POSTGRES_DB: secure_api_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U secure_api -d secure_api_development" ]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.compose
    command: >
      sh -c "bundle check || bundle install &&
             bin/rails db:prepare &&
             bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://secure_api:secure_api@db:5432/secure_api_development
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-docker_development_jwt_secret_change_me_32b}
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
